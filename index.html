<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Химический чатбот</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 1em;
      background: #f0f2f5;
      color: #1c1e21;
    }
    h1 {
      text-align: center;
      color: #1877f2;
      margin: 0.8em 0;
    }
    #settings {
      max-width: 640px;
      margin: 0 auto 1em;
      text-align: center;
    }
    #server-url {
      width: 100%;
      max-width: 520px;
      padding: 0.7em;
      font-size: 1em;
      border: 1px solid #ccd0d5;
      border-radius: 8px;
      box-sizing: border-box;
    }
    #chat-container {
      max-width: 720px;
      margin: 0 auto;
      border-radius: 12px;
      background: white;
      box-shadow: 0 1px 6px rgba(0,0,0,0.12);
      overflow: hidden;
    }
    #chat {
      height: 420px;
      overflow-y: auto;
      padding: 1.2em;
      display: flex;
      flex-direction: column;
      gap: 0.6em;
    }
    .msg {
      max-width: 82%;
      padding: 0.9em 1.3em;
      border-radius: 20px;
      line-height: 1.4;
      word-break: break-word;
    }
    .user {
      background: #0084ff;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 5px;
    }
    .bot {
      background: #e4e6eb;
      color: #050505;
      align-self: flex-start;
      border-bottom-left-radius: 5px;
    }
    #input-area {
      display: flex;
      padding: 0.8em 1.2em;
      border-top: 1px solid #e4e6eb;
      background: #f0f2f5;
    }
    #input {
      flex: 1;
      padding: 0.9em 1.2em;
      font-size: 1em;
      border: 1px solid #ccd0d5;
      border-radius: 20px;
      outline: none;
      background: white;
    }
    #input:focus {
      border-color: #0084ff;
    }
    #send-btn, #clear-btn {
      margin-left: 0.6em;
      padding: 0.9em 1.6em;
      font-size: 1em;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 500;
    }
    #send-btn {
      background: #0084ff;
      color: white;
    }
    #send-btn:hover { background: #0069d9; }
    #clear-btn {
      background: #e4e6eb;
      color: #050505;
    }
    #clear-btn:hover { background: #d8dade; }
    .loading {
      align-self: flex-start;
      color: #65676b;
      font-style: italic;
      padding: 0.9em 1.3em;
    }
  </style>
</head>
<body>

  <h1>Химический чатбот</h1>

  <div id="settings">
    <label for="server-url">Адрес сервера (serveо / pinggy / localhost):</label><br>
    <input id="server-url" type="text" placeholder="https://chemistry-chatbot-1-ph95.onrender.com">
  </div>

  <div id="chat-container">
    <div id="chat"></div>
    <div id="input-area">
      <input id="input" type="text" placeholder="Пример: молярная масса H2SO4   или   48 г O2 сколько моль">
      <button id="send-btn">Отправить</button>
      <button id="clear-btn">Очистить</button>
    </div>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const serverUrlInput = document.getElementById("server-url");
    const sendBtn = document.getElementById("send-btn");
    const clearBtn = document.getElementById("clear-btn");

  
    const savedUrl = localStorage.getItem("chemistryBotServerUrl");
    if (savedUrl) serverUrlInput.value = savedUrl;


    serverUrlInput.addEventListener("change", () => {
      localStorage.setItem("chemistryBotServerUrl", serverUrlInput.value.trim());
    });

    function addMessage(text, type = "bot", isLoading = false) {
      const div = document.createElement("div");
      div.className = `msg ${type}`;
      if (isLoading) div.classList.add("loading");
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function clearChat() {
      chat.innerHTML = "";
    }

    async function send() {
      const message = input.value.trim();
      if (!message) return;

      addMessage(message, "user");
      const loadingMsg = addMessage("Бот думает...", "bot", true);

      input.value = "";
      input.focus();

      const base = serverUrlInput.value.trim() || "http://127.0.0.1:8000";
      const url = `${base.replace(/\/$/, "")}/chat`;

      try {
        const res = await fetch(url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "ngrok-skip-browser-warning": "69420", 
            "Accept": "application/json"
          },
          body: JSON.stringify({ message })
        });

        if (!res.ok) {
          throw new Error(`Сервер ответил ${res.status} ${res.statusText}`);
        }

        const data = await res.json();
        loadingMsg.textContent = data.reply || "Ответ пустой";
        loadingMsg.classList.remove("loading");

      } catch (err) {
        loadingMsg.textContent = `Ошибка: ${err.message}`;
        loadingMsg.style.color = "#d32f2f";
        console.error(err);
      }

      chat.scrollTop = chat.scrollHeight;
    }

    // События
    sendBtn.addEventListener("click", send);
    input.addEventListener("keypress", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    clearBtn.addEventListener("click", clearChat);
  </script>

</body>
</html>
