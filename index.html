<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Химический чатбот</title>
  <style>
    body { font-family: sans-serif; margin: 2em; }
    #chat { border: 1px solid #ccc; padding: 1em; height: 300px; overflow-y: auto; }
    .msg { margin: .5em 0; padding: .4em; border-radius: 5px; max-width: 70%; }
    .user { background: #d0ebff; align-self: flex-end; }
    .bot { background: #d3f9d8; align-self: flex-start; }
    #container { display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <h1>Химический чатбот</h1>
  <div id="chat" style="display:flex; flex-direction:column;"></div>
  <input id="input" type="text" placeholder="Введите сообщение..." style="width:80%;">
  <button onclick="send()">Отправить</button>

  <script>
    async function send() {
      const input = document.getElementById("input");
      const msg = input.value;
      if (!msg) return;

      addMessage("Вы: " + msg, "user");
      input.value = "";

      const res = await fetch("http://127.0.0.1:8000/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: msg})
      });
      const data = await res.json();

      addMessage("Бот: " + data.reply, "bot");
    }

    function addMessage(text, cls) {
      const div = document.createElement("div");
      div.className = "msg " + cls;
      div.textContent = text;
      document.getElementById("chat").appendChild(div);
      div.scrollIntoView();
    }
  </script>
</body>
</html>
